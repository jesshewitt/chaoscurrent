  url: "https://www.chaostarot.com/app/"
  type: tool
  topics:
    - sigils
    - divination
  annotation: |
    A browser based toolbox for practical magic. Seven sigil methods (Spare,
    planetary kameas, Rose Cross, Witch's Wheel, and others), tarot and
    I Ching decks, runes, a Dreamachine, pathworking exercises, ritual
    guides, and cut up tools.
  added: "2026-04-19"

- id: reddit-occult
  title: "r/occult"
  url: "https://www.reddit.com/r/occult/"
  type: community
  topics:
    - theory
    - history
  annotation: |
    Reddit's general occult subreddit. Broader in scope than r/chaosmagick,
    covering questions across traditions.
  added: "2026-04-19"

- id: iot-british-isles
  title: "Illuminates of Thanateros (British Isles)"
  url: "https://iotbritishisles.com/"
  type: community
  topics:
    - group-practice
    - ritual
    - theory
  annotation: |
    The British section of the Illuminates of Thanateros, a chaos magic
    magical order founded in 1978. The site hosts essays, event listings,
    membership information, and a record of the section's work.
  added: "2026-04-19"

- id: hermetic-topy
  title: "TOPY Archive at Hermetic.com"
  url: "https://hermetic.com/topy/"

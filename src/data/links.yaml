  added: "2026-04-19"

- id: chapman-advanced-magick-for-beginners
  title: "Advanced Magick for Beginners"
  url: "https://archive.org/details/advanced-magick-for-beginners-alan-chapman"
  type: book
  author: "Alan Chapman"
  year: 2008
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - alan-chapman
  annotation: |
    A single volume chaos magic book by Alan Chapman. Structured around a
    small set of principles and practical exercises. Full text is
    available on the Internet Archive.
  added: "2026-04-20"

- id: morrison-pop-magic
  title: "Pop Magic!"
  url: "https://archive.org/details/pop-magic-grant-morrison"
  type: essay
  author: "Grant Morrison"
  year: 2003
  topics:
    - theory
    - sigils
    - music-and-art
  people:
    - grant-morrison
  annotation: |
    Morrison's essay from Book of Lies: The Disinformation Guide to Magick
    and the Occult. Argues that pop culture, comics, rock stars, brands,

    Spare's foundational treatise covering the Sacred Alphabet, the
    Alphabet of Desire, the Death Posture, and the original sigil method.
    A direct source for the chaos magic sigil tradition.
  added: "2026-04-19"

- id: lee-chaotopia
  title: "Chaotopia"
  url: "https://chaotopia.com/"
  type: blog
  author: "Dave Lee"
  topics:
    - theory
    - ritual
    - group-practice
  people:
    - dave-lee
  annotation: |
    Dave Lee's personal site. IOT founding member and author of Chaotopia!.
    Links out to his Patreon and Teachable for essays and structured courses.
  added: "2026-04-19"

- id: wachter-site
  title: "Aidan Wachter"

  year: 2012
  topics:
    - sigils
  people:
    - frater-ud
  paid: true
  annotation: |
    A practical guide to sigil work covering multiple methods, construction,
    charging, and firing. Includes exercises and variations.
  added: "2026-04-19"

- id: vitimus-hands-on-chaos-magic
  title: "Hands-On Chaos Magic: Reality Manipulation through the Ovayki Current"
  url: "https://www.llewellyn.com/product.php?ean=9780738715087"
  type: book
  author: "Andrieh Vitimus"
  year: 2009
  topics:
    - ritual
    - sigils
    - gnosis
  people:
    - andrieh-vitimus
  paid: true
  annotation: |
    An exercise-heavy course built around the Ovayki current, structured
    around repeated practice rather than theory.
  added: "2026-04-19"

- id: wachter-six-ways
  title: "Six Ways: Approaches & Entries for Practical Magic"
  url: "https://www.aidanwachter.com/six-ways"
  type: book
  author: "Aidan Wachter"

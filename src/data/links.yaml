    - sigils
    - servitors
    - evocation
  people:
    - aidan-wachter
  paid: true
  annotation: |
    A handbook drawing from chaos magic, animism, and folk practice. Covers
    sigils, servitors, candle work, talismans, and spirit ecology.
  added: "2026-04-19"

- id: carroll-this-is-chaos
  title: "This Is Chaos: Embracing the Future of Magic"
  url: "https://redwheelweiser.com/book/this-is-chaos-embracing-the-future-of-magic-9781578638734/"
  type: book
  author: "Peter J. Carroll (editor)"
  year: 2025
  topics:

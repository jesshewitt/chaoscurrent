  topics:
    - theory
    - sigils
    - history
    - ritual
  annotation: |
    An early-web chaos magic library dating from the 1990s. Hosts
    foundational essays by Carroll, Hine, Frater U∴D∴, and others. Served
    over plain HTTP, so browsers display a "Not Secure" warning.
  added: "2026-04-19"

- id: biroco-kaos-archive

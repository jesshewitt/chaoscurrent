  topics:
    - ritual
    - sigils
    - servitors
  people:
    - aidan-wachter
  annotation: |
    Wachter's author site. Information on his books (Six Ways, Weaving
    Fate, Changeable), plus links to his Patreon community and Discord
    server.
  added: "2026-04-19"

- id: rune-soup

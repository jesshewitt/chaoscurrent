  author: "Ivy Corvus"
  year: 2026
  topics:
    - theory
    - sigils
    - ritual
  people:
    - ivy-corvus
  paid: true
  annotation: |
    A short beginner's guide in the Pagan Portals series, structured in two
    halves: theory and praxis. Covers basic chaos magic concepts and
    introductory exercises.
  added: "2026-04-19"

- id: dukes-ssotbme-revised
  title: "SSOTBME Revised: An Essay on Magic"
  url: "https://www.shiftingedges.com/ssotbme.pdf"

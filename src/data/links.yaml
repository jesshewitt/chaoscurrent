- id: carroll-liber-null
  title: "Liber Null & Psychonaut"
  url: "https://redwheelweiser.com/book/liber-null-psychonaut-9781578637669/"
  type: book
  author: "Peter J. Carroll"
  year: 1987
  topics:
    - theory
    - sigils
    - ritual
    - gnosis
  people:
    - peter-carroll
  annotation: |
    The founding primer for modern chaos magic technique. Sigils, gnosis, the
    magical pact, the practice of magical psychology. The 2022 Weiser Classics
    edition adds a Ronald Hutton foreword; the 1987 original is the historical
    text.
  added: "2026-04-19"

- id: hine-condensed-chaos
  title: "Condensed Chaos"
  url: "https://www.originalfalcon.com/condensed-chaos.php"
  type: book
  author: "Phil Hine"
  year: 1995
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - phil-hine
  annotation: |
    An accessible introduction with exercises you can sit down and do.
    Friendlier than Carroll, just as practical. The classic recommendation for
    newcomers who want a single book to start with.
  added: "2026-04-19"

- id: carroll-liber-kaos
  title: "Liber Kaos"
  url: "https://redwheelweiser.com/book/liber-kaos-9781578638048/"
  type: book
  author: "Peter J. Carroll"
  year: 1992
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - peter-carroll
  annotation: |
    Carroll's second major book and the more theoretical of the pair. Aeonics,
    magical mathematics, and a complete IOT flavored training course. Heavier
    going than Liber Null but rewards the effort.
  added: "2026-04-19"

- id: hine-prime-chaos
  title: "Prime Chaos: Adventures in Chaos Magic"
  url: "https://www.originalfalcon.com/prime-chaos-adventures-in-chaos-magic.php"
  type: book
  author: "Phil Hine"
  year: 1993
  topics:
    - ritual
    - evocation
    - group-practice
  people:
    - phil-hine
  annotation: |
    Hine's companion to Condensed Chaos, published around the same time. Goes
    deeper on ritual structures, evocation, group work, and possession. Less
    primer, more practitioner's notebook. Foreword by Grant Morrison.
  added: "2026-04-19"

- id: sherwin-book-of-results
  title: "The Book of Results"
  url: "https://www.goodreads.com/book/show/1602373.The_Book_of_Results"
  type: book
  author: "Ray Sherwin"
  year: 1978
  topics:
    - sigils
    - theory
    - history
  people:
    - ray-sherwin
  annotation: |
    The first published book on chaos magic, written and self published by Ray
    Sherwin alongside Carroll's earliest work. A short, sigil focused primer
    that codified Spare's method for the new current.
  added: "2026-04-19"

- id: frater-ud-practical-sigil-magic
  title: "Practical Sigil Magic: Creating Personal Symbols for Success"
  url: "https://www.llewellyn.com/product.php?ean=9780738731537"
  type: book
  author: "Frater U∴D∴"
  year: 2012
  topics:
    - sigils
  people:
    - frater-ud
  annotation: |
    The deepest practical guide to sigil work in print. Multiple methods,
    exhaustive coverage of construction, charging, and firing. If you only own
    one book about sigils, own this.
  added: "2026-04-19"

- id: vitimus-hands-on-chaos-magic
  title: "Hands-On Chaos Magic: Reality Manipulation through the Ovayki Current"
  url: "https://www.llewellyn.com/product.php?ean=9780738715087"
  type: book
  author: "Andrieh Vitimus"
  year: 2009
  topics:
    - ritual
    - sigils
    - gnosis
  people:
    - andrieh-vitimus
  annotation: |
    Vitimus's irreverent, exercise heavy course. Modern, friendly, results
    oriented. A good companion or alternative to Hine for the same job.
  added: "2026-04-19"

- id: wachter-six-ways
  title: "Six Ways: Approaches & Entries for Practical Magic"
  url: "https://www.aidanwachter.com/six-ways"
  type: book
  author: "Aidan Wachter"
  year: 2018
  topics:
    - ritual
    - sigils
    - servitors
    - evocation
  people:
    - aidan-wachter
  annotation: |
    Wachter's handbook drawing from chaos magic, animism, and folk practice.
    Sigils, servitors, candle work, talismans, and spirit ecology in plain
    language. Self published and widely loved.
  added: "2026-04-19"

- id: carroll-this-is-chaos
  title: "This Is Chaos: Embracing the Future of Magic"
  url: "https://redwheelweiser.com/book/this-is-chaos-embracing-the-future-of-magic-9781578638734/"
  type: book
  author: "Peter J. Carroll (editor)"
  year: 2025
  topics:
    - theory
    - ritual
  people:
    - peter-carroll
    - aidan-wachter
    - dave-lee
    - ivy-corvus
    - ramsey-dukes
  annotation: |
    Thirteen essays from current chaos magic practitioners edited by Carroll,
    with a foreword by Ronald Hutton. Contributors include Aidan Wachter,
    Carl Abrahamsson, Dave Lee, Ivy Corvus, Julian Vayne, Lionel Snell, and
    others. A snapshot of where the current is now.
  added: "2026-04-19"

- id: corvus-pagan-portals-chaos-magic
  title: "Pagan Portals: Chaos Magic"
  url: "https://www.collectiveinkbooks.com/moon-books/our-books/pagan-portals-chaos-magic"
  type: book
  author: "Ivy Corvus"
  year: 2026
  topics:
    - theory
    - sigils
    - ritual
  people:
    - ivy-corvus
  annotation: |
    A current beginner's guide. Short, plainspoken, practical, structured as
    theory then praxis. A recommended starting point for someone today who
    wants the shortest path from "what is this" to "how do I try it."
  added: "2026-04-19"

- id: dukes-ssotbme-revised
  title: "SSOTBME Revised: An Essay on Magic"
  url: "https://www.shiftingedges.com/ssotbme.pdf"
  type: book
  author: "Ramsey Dukes (Lionel Snell)"
  year: 1974
  topics:
    - theory
    - ethics
    - history
  people:
    - ramsey-dukes
  annotation: |
    Snell's deceptively gentle book arguing that magic is a fourth way of
    perceiving reality alongside science, art, and religion. Predates and
    helped midwife the chaos current. Still the best introduction for the
    philosophically inclined.
  added: "2026-04-19"

- id: specularium
  title: "Specularium"
  url: "https://www.specularium.org/"
  type: blog
  author: "Peter J. Carroll"
  topics:
    - theory
    - history
  people:
    - peter-carroll
  annotation: |
    Carroll's own ongoing site, home of essays and announcements.
  added: "2026-04-19"

- id: carroll-chaos-magic-in-a-nutshell
  title: "Chaos Magic in a Nutshell"
  url: "https://www.specularium.org/wizardry"
  type: essay
  author: "Peter J. Carroll"
  year: 2014
  topics:
    - theory
    - paradigms
  people:
    - peter-carroll
  annotation: |
    A short, dense statement of chaos magic as practice. Carroll defines magic
    as the use of imaginary phenomena to create real effects and walks through
    belief as a tool, gnosis, and the magical link in fewer words than most
    introductions take to clear their throat.
  added: "2026-04-19"

- id: spare-book-of-pleasure
  title: "The Book of Pleasure (Self-Love): The Psychology of Ecstasy"
  url: "https://hermetic.com/spare/pleasure"
  type: essay
  author: "Austin Osman Spare"
  year: 1913
  topics:
    - theory
    - sigils
    - gnosis
    - history
  people:
    - austin-osman-spare
  annotation: |
    Spare's foundational treatise. The Sacred Alphabet, the Alphabet of
    Desire, the Death Posture, and the original sigil method, written in his
    characteristic feverish prose. Required reading for anyone tracing chaos
    magic back to its source.
  added: "2026-04-19"

- id: lee-chaotopia
  title: "Chaotopia"
  url: "https://chaotopia.com/"
  type: blog
  author: "Dave Lee"
  topics:
    - theory
    - ritual
    - group-practice
  people:
    - dave-lee
  annotation: |
    Dave Lee's personal site. IOT founding member and author of Chaotopia!.
    Links out to his Patreon and Teachable for essays and structured courses.
  added: "2026-04-19"

- id: wachter-site
  title: "Aidan Wachter"
  url: "https://www.aidanwachter.com/"
  type: blog
  author: "Aidan Wachter"
  topics:
    - ritual
    - sigils
    - servitors
  people:
    - aidan-wachter
  annotation: |
    Wachter's author site. Information on his books (Six Ways, Weaving Fate,
    Changeable), plus links to his Patreon community and Discord server. The
    animism adjacent voice in the chaos current.
  added: "2026-04-19"

- id: rune-soup
  title: "Rune Soup"
  url: "https://runesoup.com/"
  type: podcast
  author: "Gordon White"
  topics:
    - theory
    - ritual
    - history
  people:
    - gordon-white
  annotation: |
    Gordon White's long running show. Conversations with practitioners,
    academics, and outliers about magic, animism, and spirit work. Broad in
    scope but rooted in chaos magic methodology.
  added: "2026-04-19"

- id: glitch-bottle
  title: "Glitch Bottle"
  url: "https://www.glitchbottle.com/"
  type: podcast
  author: "Alexander Eth"
  topics:
    - ritual
    - history
    - evocation
  annotation: |
    Alexander Eth's Western esoterica podcast. Primarily ceremonial and
    grimoire focused, with chaos magicians appearing as guests alongside
    Solomonic practitioners, scholars, and spirit workers. Careful
    interviewing, long form episodes.
  added: "2026-04-19"

- id: ramsey-dukes-youtube
  title: "Ramsey Dukes on YouTube"
  url: "https://www.youtube.com/@RamseyDukes"
  type: video
  author: "Ramsey Dukes (Lionel Snell)"
  topics:
    - theory
    - ethics
    - postmodern
  people:
    - ramsey-dukes
  annotation: |
    Lionel Snell's short video essays in the Ramsey Dukes voice. Meditations
    on the philosophy of magic, many of them filmed outdoors in a field.
    Quiet, dry, essential.
  added: "2026-04-19"

- id: sigil-engine
  title: "Sigil Engine"
  url: "https://www.sigilengine.com/"
  type: tool
  author: "Darragh Mason and David Tidman"
  topics:
    - sigils
  annotation: |
    Interactive sigil generator. Type a statement of intent and the page
    converts your keystroke timing against Crowley's Liber Cheth vel Vallum
    Abiegni into a unique glyph. Downloads as image and stencil.
  added: "2026-04-19"

- id: reddit-chaosmagick
  title: "r/chaosmagick"
  url: "https://www.reddit.com/r/chaosmagick/"
  type: community
  topics:
    - theory
    - sigils
    - gnosis
    - ritual
  annotation: |
    Reddit's main chaos magic subreddit. Highly uneven but the largest
    general discussion venue online. Beginners asking first ritual questions,
    long time practitioners trading techniques, debate about whether
    something counts as chaos magic.
  added: "2026-04-19"

- id: chaos-matrix
  title: "Chaos Matrix"
  url: "http://www.chaosmatrix.org/"
  type: archive
  topics:
    - theory
    - sigils
    - history
    - ritual
  annotation: |
    The site this directory is a spiritual successor to. Dates from the early
    web era. Hosts a large library of foundational essays by Carroll, Hine,
    Frater U∴D∴, and others that are otherwise hard to find online. Served
    over plain HTTP; browsers will flag it as "Not Secure."
  added: "2026-04-19"

- id: biroco-kaos-archive
  title: "KAOS Magazine Archive"
  url: "https://www.biroco.com/kaos/"
  type: archive
  author: "Joel Biroco"
  topics:
    - history
    - theory
  people:
    - joel-biroco
  annotation: |
    Biroco's underground occult magazine, founded in 1985, with the last
    issue (#14) in 2002. The archive preserves back issues and a record of
    the 1980s and early 2000s occult scene.
  added: "2026-04-19"

- id: principia-discordia
  title: "Principia Discordia"
  url: "https://archive.org/details/PrincipiaDiscordia_201806"
  type: adjacent
  author: "Malaclypse the Younger and Lord Omar Khayyam Ravenhurst"
  year: 1963
  topics:
    - postmodern
    - theory
    - history
  people:
    - malaclypse-the-younger
    - kerry-thornley
    - robert-anton-wilson
  annotation: |
    The Discordian holy text by Greg Hill (Malaclypse the Younger) and Kerry
    Thornley (Lord Omar Khayyam Ravenhurst), with a foreword by Robert Anton
    Wilson in later editions. Not chaos magic proper but essential context.
    Most chaos magicians have read it; many were radicalized by it.
  added: "2026-04-19"

- id: carroll-the-epoch
  title: "The Epoch"
  url: "https://specularium.org/peter-j-carroll/the-epoch"
  type: essay
  author: "Peter J. Carroll and Matt Kaybryn"
  year: 2014
  topics:
    - theory
    - paradigms
    - godforms
  people:
    - peter-carroll
  annotation: |
    Carroll and Kaybryn's chaos magic system from 2014, combining aeonic
    theory with a contemporary magical pantheon and ritual practice. Includes
    a 54 card Altar Icon Deck. A 2025 Mandrake of Oxford edition is the
    current print.
  added: "2026-04-19"

- id: chaos-magick-news
  title: "Chaos Magick News"
  url: "https://www.chaosmagicknews.com/"
  type: blog
  topics:
    - theory
    - history
  annotation: |
    A contemporary online magazine covering chaos magic philosophy, interviews
    with practitioners, and related occult news. One of the few currently
    active editorial sites for the scene rather than just a personal blog.
  added: "2026-04-19"

- id: weird-studies
  title: "Weird Studies"
  url: "https://www.weirdstudies.com/"
  type: podcast
  author: "Phil Ford and J. F. Martel"
  topics:
    - theory
    - postmodern
    - divination
  annotation: |
    Academic and philosophical podcast hosted by Phil Ford and J. F. Martel.
    Not a chaos magic show, but the frame of mind is adjacent. The weird,
    the occult, divination, and the limits of rational thought. Many chaos
    magicians list it as a regular listen.
  added: "2026-04-19"

- id: pagan-chaos-magic-podcast
  title: "Pagan Chaos Magic"
  url: "https://podcasts.apple.com/us/podcast/pagan-chaos-magic/id302031534"
  type: podcast
  author: "Ki'a Dragon"
  topics:
    - theory
    - ritual
    - sigils
  annotation: |
    Ki'a Dragon's chaos magic podcast, running 2009 to 2019 with 23 episodes.
    Paradigms, intent, sigils, and related topics. Archived rather than
    ongoing, but worth mining for specific topics.
  added: "2026-04-19"

- id: angelas-symposium
  title: "Angela's Symposium"
  url: "https://www.youtube.com/channel/UCPSbip_LX2AxbGeAQfLp-Ig"
  type: video
  author: "Dr Angela Puca"
  topics:
    - theory
    - history
    - postmodern
  annotation: |
    Dr Angela Puca's YouTube channel. Academic study of esotericism,
    witchcraft, paganism, and shamanism, with interviews of practitioners
    including chaos magicians. Best source on YouTube for rigorous,
    footnoted treatment of the subject.
  added: "2026-04-19"

- id: trinary-toolkit
  title: "Trinary Toolkit"
  url: "https://www.chaostarot.com/app/"
  type: tool
  topics:
    - sigils
    - divination
  annotation: |
    A browser based toolbox for practical magic. Seven sigil methods (Spare,
    planetary kameas, Rose Cross, Witch's Wheel, and others), tarot and
    I Ching decks, runes, a Dreamachine, pathworking exercises, ritual
    guides, and cut up tools. All client side, nothing stored.
  added: "2026-04-19"

- id: reddit-occult
  title: "r/occult"
  url: "https://www.reddit.com/r/occult/"
  type: community
  topics:
    - theory
    - history
  annotation: |
    Reddit's broader occult subreddit. Larger than r/chaosmagick and less
    focused, but useful for context, questions that cross traditions, and
    access to a wider practitioner pool.
  added: "2026-04-19"

- id: iot-british-isles
  title: "Illuminates of Thanateros (British Isles)"
  url: "https://iotbritishisles.com/"
  type: community
  topics:
    - group-practice
    - ritual
    - theory
  annotation: |
    The British section of the IOT, the oldest chaos magic magical order.
    The site has essays, event listings, membership information, and a
    record of the section's work. Closest thing to an official entry point
    for the order.
  added: "2026-04-19"

- id: hermetic-topy
  title: "TOPY Archive at Hermetic.com"
  url: "https://hermetic.com/topy/"
  type: archive
  topics:
    - history
    - ritual
    - sigils
  people:
    - genesis-p-orridge
  annotation: |
    Preserved materials from the Temple ov Psychick Youth, Genesis
    P-Orridge's late 20th century psychic magic network. Bulletins, sigil
    sheets, ritual ephemera. Influential on the wider chaos current by
    osmosis.
  added: "2026-04-19"

- id: sacred-texts-chaos
  title: "Sacred-Texts Chaos Section"
  url: "https://sacred-texts.com/eso/chaos/"
  type: archive
  topics:
    - theory
    - history
  annotation: |
    John Bruno Hare's long running esoteric library. The chaos magic section
    includes Carroll's Liber Null excerpts, a "Defining Chaos" essay, and
    related texts. Spare's writings are hosted in a separate section of the
    same site.
  added: "2026-04-19"

- id: hakim-bey-taz
  title: "T.A.Z.: The Temporary Autonomous Zone"
  url: "https://hermetic.com/bey/taz_cont"
  type: adjacent
  author: "Hakim Bey (Peter Lamborn Wilson)"
  year: 1991
  topics:
    - postmodern
    - theory
    - history
  people:
    - hakim-bey
  annotation: |
    Hakim Bey's 1991 manifesto on ontological anarchism and fleeting zones
    of autonomy. Not magic, but adjacent. Near universal reading in the 90s
    and early 2000s chaos magic scene; its fingerprints are on much of the
    practice that followed.
  added: "2026-04-19"

- id: chapman-advanced-magick-for-beginners
  title: "Advanced Magick for Beginners"
  url: "https://archive.org/details/advanced-magick-for-beginners-alan-chapman"
  type: book
  author: "Alan Chapman"
  year: 2008
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - alan-chapman
  annotation: |
    Chapman's counterintuitively titled primer. Works as a single volume
    first book on chaos magic, structured around a small set of principles
    and practical exercises. Often recommended in practitioner communities
    as the cleanest modern starting point. Free to read in full on the
    Internet Archive.
  added: "2026-04-20"

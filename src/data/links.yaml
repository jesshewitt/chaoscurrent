  author: "Ramsey Dukes (Lionel Snell)"
  year: 1974
  topics:
    - theory
    - ethics
    - history
  people:
    - ramsey-dukes
  annotation: |
    Snell's 1974 essay arguing that magic is a fourth mode of perceiving
    reality alongside science, art, and religion. Predates the chaos magic
    movement and influenced it directly.
  added: "2026-04-19"

- id: specularium
  title: "Specularium"
  url: "https://www.specularium.org/"
  type: blog
  author: "Peter J. Carroll"
  topics:
    - theory
    - history
  people:
    - peter-carroll
  annotation: |
    Carroll's own ongoing site, home of essays and announcements.
  added: "2026-04-19"

- id: carroll-chaos-magic-in-a-nutshell
  title: "Chaos Magic in a Nutshell"
  url: "https://www.specularium.org/wizardry"
  type: essay
  author: "Peter J. Carroll"
  year: 2014
  topics:
    - theory
    - paradigms
  people:
    - peter-carroll
  annotation: |
    A short statement of chaos magic as practice. Carroll defines magic as
    the use of imaginary phenomena to create real effects and outlines
    belief as a tool, gnosis, and the magical link.
  added: "2026-04-19"

- id: spare-book-of-pleasure

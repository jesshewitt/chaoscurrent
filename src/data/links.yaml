    - kerry-thornley
    - robert-anton-wilson
  annotation: |
    The Discordian holy text by Greg Hill (Malaclypse the Younger) and
    Kerry Thornley (Lord Omar Khayyam Ravenhurst), with a foreword by
    Robert Anton Wilson in later editions. Discordianism is a
    philosophical influence on chaos magic.
  added: "2026-04-19"


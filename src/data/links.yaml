    building. Available in full on the Internet Archive.
  added: "2026-04-20"

- id: morrison-invisibles
  title: "The Invisibles"
  url: "https://www.dccomics.com/graphic-novels/the-invisibles-1994/the-invisibles-book-one"
  type: book
  author: "Grant Morrison"
  year: 1994
  topics:
    - music-and-art
    - theory
    - ritual
  people:
    - grant-morrison
  paid: true
  annotation: |
    Morrison's comic series, published 1994 to 2000 by Vertigo. A
    conspiracy-occult epic whose plotting, characters, and sigil work draw
    directly on chaos magic. Morrison has described writing the series as
    itself a magical working.
  added: "2026-04-20"

- id: chaos-magick-news
  title: "Chaos Magick News"
  url: "https://www.chaosmagicknews.com/"
  type: blog
  topics:
    - theory
    - history
  annotation: |
    An online magazine covering chaos magic philosophy, interviews with
    practitioners, and related occult news. Editorial format with multiple
    contributors.
  added: "2026-04-19"

- id: weird-studies
  title: "Weird Studies"
  url: "https://www.weirdstudies.com/"
  type: podcast
  author: "Phil Ford and J. F. Martel"
  topics:
    - theory
    - divination
  annotation: |
    Academic and philosophical podcast hosted by Phil Ford and J. F.
    Martel. Topics include the weird, the occult, divination, and the
    limits of rational thought.
  added: "2026-04-19"

- id: pagan-chaos-magic-podcast

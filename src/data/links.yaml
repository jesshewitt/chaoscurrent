- id: carroll-liber-null
  title: "Liber Null & Psychonaut"
  url: "https://redwheelweiser.com/book/liber-null-psychonaut-9781578637669/"
  type: book
  author: "Peter J. Carroll"
  year: 1987
  topics:
    - theory
    - sigils
    - ritual
    - gnosis
  people:
    - peter-carroll
  paid: true
  annotation: |
    The founding primer for modern chaos magic technique. Sigils, gnosis, the
    magical pact, the practice of magical psychology. The 2022 Weiser Classics
    edition adds a Ronald Hutton foreword; the 1987 original is the historical
    text.
  added: "2026-04-19"

- id: hine-condensed-chaos
  title: "Condensed Chaos"
  url: "https://www.originalfalcon.com/condensed-chaos.php"
  type: book
  author: "Phil Hine"
  year: 1995
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - phil-hine
  paid: true
  annotation: |
    An introduction to chaos magic covering sigils, gnosis, banishing, and
    basic ritual, built around practical exercises. Plain language, short
    chapters.
  added: "2026-04-19"

- id: carroll-liber-kaos
  title: "Liber Kaos"
  url: "https://redwheelweiser.com/book/liber-kaos-9781578638048/"
  type: book
  author: "Peter J. Carroll"
  year: 1992
  topics:
    - theory
    - ritual
    - paradigms
  people:
    - peter-carroll
  paid: true
  annotation: |
    Carroll's second major book. Covers aeonic theory, magical mathematics,
    and the Illuminates of Thanateros training system in detail.
  added: "2026-04-19"

- id: hine-prime-chaos
  title: "Prime Chaos: Adventures in Chaos Magic"
  url: "https://www.originalfalcon.com/prime-chaos-adventures-in-chaos-magic.php"
  type: book
  author: "Phil Hine"
  year: 1993
  topics:
    - ritual
    - evocation
    - group-practice
  people:
    - phil-hine
  paid: true
  annotation: |
    Hine's companion to Condensed Chaos, published around the same time.
    Covers ritual structures, evocation, group work, and possession in
    greater depth. Foreword by Grant Morrison.
  added: "2026-04-19"

- id: sherwin-book-of-results
  title: "The Book of Results"
  url: "https://www.goodreads.com/book/show/1602373.The_Book_of_Results"
  type: book
  author: "Ray Sherwin"
  year: 1978
  topics:
    - sigils
    - theory
    - history
  people:
    - ray-sherwin
  paid: true
  annotation: |
    The first published book on chaos magic, written and self published by Ray
    Sherwin alongside Carroll's earliest work. A short, sigil focused primer
    that codified Spare's method for the new current.
  added: "2026-04-19"

- id: frater-ud-practical-sigil-magic

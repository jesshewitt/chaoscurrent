  author: "Aleister Crowley"
  year: 1909
  topics:
    - theory
    - godforms
  people:
    - aleister-crowley
  annotation: |
    A system of correspondences mapping the Tree of Life to colors, herbs,
    gods, perfumes, and many other categories. Compiled and annotated by
    Crowley from Golden Dawn source material and Allan Bennett's earlier
    tables. Widely used as a reference by practitioners across traditions.
    Full text on the Internet Archive.
  added: "2026-04-21"


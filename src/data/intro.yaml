intro: |
    Chaos magic is a results first approach to practice that treats belief
    as a tool. This page is a short path in for people who are new. If you
    want the full index, try Topics or All.

sections:
    - heading: "Foundations"
      kind: entries
      entries:
          - ref: chapman-advanced-magick-for-beginners
            note: "A single volume primer by Alan Chapman, structured around a few core principles and practical exercises."
          - ref: hine-condensed-chaos
            note: "Practical exercises in sigils, gnosis, banishing, and basic ritual. Plain language, short chapters."
          - ref: carroll-liber-null
            note: "The foundational chaos magic primer. Covers sigils, gnosis, the magical pact, and the practice of magical psychology."

    - heading: "Ideas"
      kind: topics
      topics:
          - theory
          - sigils
          - gnosis
          - paradigms
          - history

    - heading: "Further"
      kind: entries
      entries:
          - ref: carroll-liber-kaos
            note: "Carroll's theoretical framework. Covers aeonic theory, magical mathematics, and the IOT training system."
          - ref: hine-prime-chaos
            note: "Covers ritual structures, evocation, group work, and possession. Foreword by Grant Morrison."
          - ref: frater-ud-practical-sigil-magic
            note: "A detailed guide to sigil work covering multiple methods, charging, firing, and variations."

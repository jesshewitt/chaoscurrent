- slug: peter-carroll
  name: "Peter J. Carroll"
  description: |
    Co-originator of modern chaos magic alongside Ray Sherwin. Co-founder of
    the Illuminates of Thanateros. Author of Liber Null, Liber Kaos, and
    later works.
  website: "https://specularium.org"

- slug: phil-hine
  name: "Phil Hine"
  description: |
    Author of Condensed Chaos and Prime Chaos. Writes across chaos magic
    theory, ritual, and group work.
  website: "https://enfolding.org"

- slug: austin-osman-spare
  name: "Austin Osman Spare"
  aliases:
      - "Austin Spare"
      - "A. O. Spare"
  description: |
    Early 20th century artist and occultist. Originator of sigil magic and
    the death posture. A direct source for the chaos current.
  website: "https://en.wikipedia.org/wiki/Austin_Osman_Spare"

- slug: ramsey-dukes
  name: "Ramsey Dukes"
  aliases:
      - "Lionel Snell"
  description: |
    Pen name of Lionel Snell. Author of SSOTBME (1974) and other writings on
    the philosophy of magic. SSOTBME predates the chaos magic movement and
    influenced its early development.
  website: "https://ramseydukes.co.uk"

- slug: ray-sherwin
  name: "Ray Sherwin"
  description: |
    Co-originator of chaos magic. Author of The Book of Results (1978), the
    first published book on chaos magic, and The Theatre of Magick.

- slug: frater-ud
  name: "Frater U∴D∴"
  description: |
    German chaos magician and author of Practical Sigil Magic and High Magic.
    Originated the five-models framework in his essay Models of Magick.
  website: "https://en.wikipedia.org/wiki/Ralph_Tegtmeier"

- slug: alan-chapman
  name: "Alan Chapman"
  description: |
    British chaos magician and author of Advanced Magick for Beginners.

- slug: andrieh-vitimus
  name: "Andrieh Vitimus"
  description: |
    American practitioner and author of Hands-On Chaos Magic.
  website: "https://andriehvitimus.com"

- slug: aidan-wachter
  name: "Aidan Wachter"
  description: |
    Author of Six Ways, Weaving Fate, and Changeable. Work draws on chaos
    magic, animism, and folk practice.
  website: "https://aidanwachter.com"

- slug: dave-lee
  name: "Dave Lee"
  description: |
    IOT founding member and author of Chaotopia! and Bright From the Well.
    Long record of ritual and breathwork practice.
  website: "https://chaotopia.com"

- slug: ivy-corvus
  name: "Ivy Corvus"
  description: |
    Author of Pagan Portals: Chaos Magic (Moon Books, 2026).
  website: "https://www.youtube.com/@IvyTheOccultist"

- slug: jaq-hawkins
  name: "Jaq D. Hawkins"
  description: |
    British chaos magician. Author of Understanding Chaos Magic (1996),
    Chaos Witch, and The Chaonomicon.
  website: "http://jaqdhawkins.co.uk"

- slug: julian-vayne
  name: "Julian Vayne"
  description: |
    British occultist. Author of Getting Higher and co-author of Chaos
    Craft. Contributor to The Blog of Baphomet.
  website: "https://julianvayne.com"

- slug: steve-dee
  name: "Steve Dee"
  description: |
    British chaos magician. Co-author of Chaos Craft and author of A Brush
    with the Divine. Contributor to The Blog of Baphomet.
  website: "https://theblogofbaphomet.com"

- slug: gordon-white
  name: "Gordon White"
  description: |
    Host of the Rune Soup podcast and author of several books. Topics span
    chaos magic, animism, and spirit work.
  website: "https://runesoup.com"

- slug: joel-biroco
  name: "Joel Biroco"
  description: |
    Editor of KAOS magazine (1985 to 2002). Associated with the
    KAOS-Babalon 156 current.
  website: "https://biroco.com"

- slug: robert-anton-wilson
  name: "Robert Anton Wilson"
  description: |
    Author of Illuminatus! (with Robert Shea), Cosmic Trigger, and Prometheus
    Rising. A philosophical source for the chaos current through model agnosticism 
    and reality tunnels.
  website: "https://rawilson.com"

- slug: malaclypse-the-younger
  name: "Malaclypse the Younger"
  aliases:
      - "Greg Hill"
  description: |
    Pen name of Greg Hill, co-author of the Principia Discordia. Central
    figure in Discordianism.
  website: "https://en.wikipedia.org/wiki/Malaclypse_the_Younger"

- slug: kerry-thornley
  name: "Kerry Thornley"
  aliases:
      - "Lord Omar Khayyam Ravenhurst"
  description: |
    Co-author of the Principia Discordia, writing as Lord Omar Khayyam
    Ravenhurst.
  website: "https://en.wikipedia.org/wiki/Kerry_Thornley"

- slug: hakim-bey
  name: "Hakim Bey"
  aliases:
      - "Peter Lamborn Wilson"
  description: |
    Pen name of Peter Lamborn Wilson. Author of T.A.Z. (1991), a manifesto
    on ontological anarchism adjacent to the chaos magic scene.
  website: "https://en.wikipedia.org/wiki/Hakim_Bey"

- slug: william-s-burroughs
  name: "William S. Burroughs"
  description: |
    American writer and co-developer with Brion Gysin of the cut-up
    technique. A direct technical influence on chaos magic sigil practice.
  website: "https://en.wikipedia.org/wiki/William_S._Burroughs"

- slug: aleister-crowley
  name: "Aleister Crowley"
  description: |
    English occultist and founder of Thelema. Author of Magick in Theory
    and Practice, Liber 777, and The Book of the Law. An upstream
    influence on chaos magic.
  website: "https://en.wikipedia.org/wiki/Aleister_Crowley"

- slug: genesis-p-orridge
  name: "Genesis P-Orridge"
  description: |
    Founder of Thee Temple ov Psychick Youth (TOPY) and of Throbbing Gristle.
    Central figure in the intersection of magic and industrial culture.
  website: "https://genesisporridge.com"

- slug: grant-morrison
  name: "Grant Morrison"
  description: |
    Scottish comics writer. Author of The Invisibles and the essay Pop
    Magic!, among many other works. Draws on chaos magic in creative output
    and public writing.
  website: "https://grantmorrison.com"

- slug: erik-davis
  name: "Erik Davis"
  description: |
    American writer and scholar. Author of TechGnosis (1998) and High
    Weirdness. Long-running commentator on the intersection of magic,
    technology, and counterculture.
  website: "https://techgnosis.com"

- slug: timothy-leary
  name: "Timothy Leary"
  description: |
    American psychologist and writer. Developed the eight-circuit model
    of consciousness. Upstream influence on chaos magic via Robert
    Anton Wilson.
  website: "https://en.wikipedia.org/wiki/Timothy_Leary"

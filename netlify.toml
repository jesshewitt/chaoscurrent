[build]
    command = "npm run build"
    publish = "dist"

[build.environment]
    NODE_VERSION = "20"

[[headers]]
    for = "/assets/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/*"
    [headers.values]
        X-Frame-Options = "DENY"
        X-Content-Type-Options = "nosniff"
        Referrer-Policy = "strict-origin-when-cross-origin"
        Content-Security-Policy = "default-src 'self'; img-src 'self' https://web.archive.org data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self'"

[[redirects]]
    from = "/feed/"
    to = "/feed.xml"
    status = 301

[[redirects]]
    from = "/topic/paradigm-shifting/"
    to = "/topic/beliefs/"
    status = 301

[[redirects]]
    from = "/topic/paradigms/"
    to = "/topic/beliefs/"
    status = 301

[[redirects]]
    from = "/adjacent/"
    to = "/topic/adjacent/"
    status = 301

[[redirects]]
    from = "/topic/postmodern/"
    to = "/topics/"
    status = 301

[[redirects]]
    from = "/topic/music-and-culture/"
    to = "/topic/music-and-art/"
    status = 301

[[redirects]]
    from = "/about/"
    to = "/"
    status = 301
